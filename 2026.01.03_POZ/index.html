<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Speaking Concerts: Cicha Noc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #fafafa;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .description {
            max-width: 800px;
            margin: 0 auto 40px auto;
            text-align: center;
            line-height: 1.6;
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 4px;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
        }

        /* STRZAŁKI */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: white;
            cursor: pointer;
            user-select: none;
            padding: 20px;
        }
        .arrow.left { left: 10px; }
        .arrow.right { right: 10px; }

        .photo-credit {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>Speaking Concerts: Cicha Noc</h1>

<div class="description">
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed non risus. Suspendisse lectus tortor, dignissim sit amet. Proin porttitor, orci nec nonummy molestie, enim est eleifend mi. Duis semper. Pellentesque congue.</p>
</div>

<div class="gallery">
<img src="Zdjecie1.jpeg">
<img src="Zdjecie2.jpeg">
<img src="Zdjecie3.jpeg">
<img src="Zdjecie4.jpeg">
<img src="Zdjecie5.jpeg">
<img src="Zdjecie6.jpeg">
<img src="Zdjecie7.jpeg">
<img src="Zdjecie8.jpeg">
<img src="Zdjecie9.jpeg">
<img src="Zdjecie10.jpeg">
<img src="Zdjecie11.jpeg">
<img src="Zdjecie12.jpeg">
<img src="Zdjecie13.jpeg">
<img src="Zdjecie14.jpeg">
<img src="Zdjecie15.jpeg">
<img src="Zdjecie16.jpeg">
</div>

<div class="photo-credit">
    fot. Bartosz Seifert
</div>

<div class="lightbox" id="lightbox">
    <span class="arrow left">&#10094;</span>
    <img src="">
    <span class="arrow right">&#10095;</span>
</div>

<script>
    const images = document.querySelectorAll('.gallery img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    const leftArrow = document.querySelector('.arrow.left');
    const rightArrow = document.querySelector('.arrow.right');

    let currentIndex = 0;

    function showImage(index) {
        currentIndex = index;
        lightboxImg.src = images[currentIndex].src;
    }

    images.forEach((img, index) => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            showImage(index);
        });
    });

    function nextImage() {
        currentIndex = (currentIndex + 1) % images.length;
        showImage(currentIndex);
    }

    function prevImage() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        showImage(currentIndex);
    }

    rightArrow.onclick = nextImage;
    leftArrow.onclick = prevImage;

    // klik poza zdjęciem zamyka
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            lightbox.style.display = 'none';
        }
    });

    // klawiatura
    document.addEventListener('keydown', (e) => {
        if (lightbox.style.display === 'flex') {
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') lightbox.style.display = 'none';
        }
    });

    // swipe (mobile)
    let startX = 0;

    lightbox.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
    });

    lightbox.addEventListener('touchend', e => {
        let endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) nextImage();
        if (endX - startX > 50) prevImage();
    });
</script>

</body>
</html>
